name: Build RocoApp APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.2'

      - name: Generate Gradle wrapper
        run: |
          gradle wrapper --gradle-version 8.2

      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v -keystore app/androidkey.jks -alias dummy_alias \
            -storepass dummy_pass -keypass dummy_pass -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=example, OU=example, O=example, L=example, S=example, C=example"

      - name: Build debug APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: roco-app-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
